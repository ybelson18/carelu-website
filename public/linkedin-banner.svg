<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <radialGradient id="lborb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4E4CF" stop-opacity="0.85"/>
      <stop offset="70%" stop-color="#D4E4CF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lborb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E4EFE0" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#E4EFE0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lborb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B8CDB2" stop-opacity="0.45"/>
      <stop offset="70%" stop-color="#B8CDB2" stop-opacity="0"/>
    </radialGradient>
    <filter id="lbblur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="lbgrain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="11"/>
      <feColorMatrix values="0 0 0 0 0.9
                             0 0 0 0 0.9
                             0 0 0 0 0.85
                             0 0 0 0.035 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Background: warm paper -->
  <rect width="1584" height="396" fill="#FAF8F5"/>

  <!-- Gradient mesh orbs -->
  <g filter="url(#lbblur)">
    <circle cx="1400" cy="100" r="360" fill="url(#lborb1)"/>
    <circle cx="200" cy="340" r="280" fill="url(#lborb2)"/>
    <circle cx="850" cy="200" r="260" fill="url(#lborb3)"/>
  </g>

  <!-- Grain -->
  <rect width="1584" height="396" fill="#FAF8F5" filter="url(#lbgrain)" opacity="0.5"/>

  <!-- Center-right headline -->
  <g transform="translate(500, 160)">
    <text x="0" y="0" font-family="Georgia, 'EB Garamond', serif" font-size="56" font-weight="500" fill="#1B2E1E" letter-spacing="-1.6">
      ABA providers and behavioral care,
    </text>
    <text x="0" y="78" font-family="Georgia, 'EB Garamond', serif" font-size="56" font-weight="500" fill="#1B2E1E" letter-spacing="-1.6">
      <tspan font-style="italic" fill="#2C3E2D">enabled.</tspan>
    </text>
  </g>

  <!-- Tagline (two lines — one sentence each) -->
  <text x="500" y="310" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="400" fill="#55524E" letter-spacing="-0.1">
    Behind every inquiry is a family in crisis.
  </text>
  <text x="500" y="338" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="400" fill="#55524E" letter-spacing="-0.1">
    We make sure none of them slip through the cracks.
  </text>

  <!-- Top-right: carelu wordmark with green dot (baseline-aligned, tight gap) -->
  <g transform="translate(1340, 75)">
    <!-- Dot sits on the x-height of the wordmark -->
    <circle cx="10" cy="16" r="8" fill="#4A7A4E"/>
    <text x="28" y="28" font-family="Georgia, 'EB Garamond', serif" font-size="38" font-weight="500" fill="#1B2E1E" letter-spacing="-0.8">carelu</text>
  </g>

  <!-- Bottom-right: underlined carelu.com -->
  <text x="1500" y="358" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#3A5A3C" letter-spacing="0.5" text-decoration="underline" text-anchor="end">carelu.com</text>
</svg>
